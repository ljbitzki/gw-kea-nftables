x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILES:-5}"

services:
  gw:
    build: ./gateway
    container_name: gw
    hostname: gw
    privileged: true
    logging: *default-logging
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      LAN_IP: "${LAN_IP:-10.88.0.1}"
      LAN_CIDR: "${LAN_CIDR:-10.88.0.0/24}"
      DHCP_POOL_START: "${DHCP_POOL_START:-10.88.0.100}"
      DHCP_POOL_END: "${DHCP_POOL_END:-10.88.0.200}"
      DHCP_DNS: "${DHCP_DNS:-1.1.1.1, 9.9.9.9, 8.8.8.8}"
      DHCP_DOMAIN: "${DHCP_DOMAIN:-lab.local}"
      KEA_CA_PORT: "${KEA_CA_PORT:-8000}"
      FW_API_PORT: "${FW_API_PORT:-8080}"
      ADMIN_USER: "${ADMIN_USER:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin}"
      FLASK_SECRET_KEY: "${FLASK_SECRET_KEY:-gwapi-dev-secret-change-me}"
      DHCP_RESERVATIONS_FILE: "${DHCP_RESERVATIONS_FILE:-/etc/gwapi/dhcp_reservations.json}"
      KEA_LEASES_FILE: "${KEA_LEASES_FILE:-/var/lib/kea/kea-leases4.csv}"
      GWAPI_LOG_LEVEL: "${GWAPI_LOG_LEVEL:-INFO}"
      KEA_LOG_LEVEL: "${KEA_LOG_LEVEL:-INFO}"
      GW_LOG_NFT_RULESET_ON_START: "${GW_LOG_NFT_RULESET_ON_START:-1}"
    ports:
      - "${FW_API_HOST_PORT:-18080}:${FW_API_PORT:-8080}"   # API do firewall
      - "${KEA_CA_HOST_PORT:-18000}:${KEA_CA_PORT:-8000}"   # Kea Control Agent
    networks:
      wan: {}
      lan:
        ipv4_address: "${LAN_IP:-10.88.0.1}"

  client1:
    build: ./client
    container_name: client1
    hostname: client1
    privileged: true
    logging: *default-logging
    depends_on:
      - gw
    networks:
      lan:
        mac_address: "${CLIENT1_MAC:-02:42:0a:58:01:01}"

  client2:
    build: ./client
    container_name: client2
    hostname: client2
    privileged: true
    logging: *default-logging
    depends_on:
      - gw
    networks:
      lan:
        mac_address: "${CLIENT2_MAC:-02:42:0a:58:01:02}"

  dockmon:
    image: "darthnorse/dockmon:${DOCKMON_TAG:-latest}"
    container_name: dockmon
    hostname: dockmon
    restart: unless-stopped
    profiles:
      - observability
    logging: *default-logging
    ports:
      - "${DOCKMON_HOST_PORT:-8001}:443"   # DockMon: dashboard HTTPS para logs e métricas dos containers
    environment:
      TZ: "${TZ:-America/Sao_Paulo}"
    volumes:
      - dockmon_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:443/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# WAN comum: Docker atribui IP dinamicamente via IPAM da própria bridge e permite saída para a internet pelo host.
networks:
  wan:
    driver: bridge

# LAN isolada: sem saída direta pelo Docker. O tráfego deve passar pelo gw. O ip_range fica separado do pool DHCP para evitar colisão entre IPAM Docker temporário e leases reais entregues pelo Kea.
  lan:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: "${LAN_CIDR:-10.88.0.0/24}"
          gateway: "${LAN_DOCKER_GATEWAY:-10.88.0.254}"
          ip_range: "${LAN_DOCKER_IP_RANGE:-10.88.0.240/28}"

volumes:
  dockmon_data:
